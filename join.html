<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a12" />
    <title>Controller</title>
    <link rel="stylesheet" href="/src/controller/controller.css" />
  </head>
  <body>
    <div id="status">Connecting…</div>

    <div id="panel-lobby" class="panel" hidden>
      <div class="dpad">
        <button type="button" id="lb-left" class="pad" aria-label="Left">◀</button>
        <button type="button" id="lb-right" class="pad" aria-label="Right">▶</button>
      </div>
      <button type="button" id="lb-jump" class="jump">Jump</button>
      <button type="button" id="lb-ready" class="primary">All players have joined</button>
    </div>

    <div id="panel-menu" class="panel" hidden>
      <p class="hint">Minigame</p>
      <div id="menu-preview" class="menu-preview"></div>
      <div class="menu-nav">
        <button type="button" id="mn-up" class="pad sm">▲</button>
        <button type="button" id="mn-down" class="pad sm">▼</button>
      </div>
      <button type="button" id="mn-confirm" class="primary">Select</button>
      <button type="button" id="mn-add" class="secondary">Add players (QR)</button>
      <button type="button" id="mn-settings" class="secondary">Game settings</button>
    </div>

    <div id="panel-stub" class="panel" hidden>
      <p class="hint">Waiting…</p>
      <button type="button" id="st-back" class="secondary">Back to menu</button>
    </div>

    <div id="panel-kart" class="panel" hidden>
      <div class="dpad">
        <button type="button" id="kt-left" class="pad" aria-label="Steer left">◀</button>
        <button type="button" id="kt-right" class="pad" aria-label="Steer right">▶</button>
      </div>
      <button type="button" id="kt-pause" class="secondary small-pause">Pause</button>
    </div>

    <div id="panel-kart-pause" class="panel" hidden>
      <p class="hint">Paused</p>
      <button type="button" id="kp-resume" class="primary">Resume</button>
      <button type="button" id="kp-menu" class="secondary">Main menu</button>
    </div>

    <div id="panel-results" class="panel" hidden>
      <p class="hint">Race over</p>
      <div id="results-preview" class="menu-preview"></div>
      <div class="menu-nav">
        <button type="button" id="rs-up" class="pad sm">▲</button>
        <button type="button" id="rs-down" class="pad sm">▼</button>
      </div>
      <button type="button" id="rs-confirm" class="primary">Choose</button>
    </div>

    <div id="panel-settings" class="panel" hidden>
      <p class="hint">Settings (stub)</p>
      <button type="button" id="set-close" class="primary">Close</button>
    </div>

    <script type="module" src="/src/controller/main.ts"></script>
  </body>
</html>
